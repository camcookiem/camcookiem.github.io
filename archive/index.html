<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive Radio - Camcookie Music</title>

  <!-- Global Camcookie Music Styles -->
  <link rel="stylesheet" href="/styles.css">

  <!-- Extra Player Styles -->
  <style>
    .player-container {
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .player-section {
      background: var(--bg-light);
      border-left: 4px solid var(--primary-color);
      border-radius: var(--border-radius);
      padding: 30px;
      margin-bottom: 30px;
      transition: var(--transition);
    }

    .player-section:hover {
      box-shadow: 0 4px 12px rgba(255, 165, 0, 0.15);
    }

    .player-section h2 {
      margin-top: 0;
      color: var(--text-dark);
      font-size: 24px;
    }

    /* Now Playing */
    #now-playing {
      background: linear-gradient(135deg, rgba(255, 165, 0, 0.1) 0%, rgba(255, 165, 0, 0.05) 100%);
      border-left: 4px solid var(--primary-color);
      border-radius: var(--border-radius);
      padding: 16px;
      margin: 20px 0;
      font-size: 18px;
      text-align: center;
      font-weight: 500;
      color: var(--text-dark);
      line-height: 1.4;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Audio Player */
    #player {
      width: 100%;
      max-width: 650px;
      display: block;
      margin: 20px auto;
      border-radius: var(--border-radius);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    /* Controls */
    #controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 25px 0;
    }

    #controls button {
      padding: 12px 20px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(255, 165, 0, 0.2);
    }

    #controls button:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 165, 0, 0.3);
    }

    #controls button:active {
      transform: translateY(0);
    }

    svg {
      width: 18px;
      height: 18px;
      display: inline;
    }

    /* Share box */
    #share-box {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      background: rgba(0, 0, 0, 0.8);
      width: 100%;
      height: 100%;
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #share-box.active {
      display: flex;
    }

    .share-modal {
      background: white;
      padding: 40px;
      border-radius: var(--border-radius);
      max-width: 500px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .share-modal h2 {
      color: var(--text-dark);
      margin-top: 0;
    }

    .share-modal p {
      color: var(--text-light);
      margin: 10px 0;
    }

    #share-link {
      background: var(--bg-light);
      padding: 12px;
      border-radius: var(--border-radius);
      word-break: break-all;
      margin: 15px 0;
      border-left: 4px solid var(--primary-color);
      font-family: monospace;
      font-size: 13px;
    }

    #close-share {
      padding: 10px 24px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: var(--transition);
    }

    #close-share:hover {
      background: var(--primary-dark);
    }

    .info-box {
      background: rgba(255, 165, 0, 0.1);
      border-left: 4px solid var(--primary-color);
      padding: 15px;
      border-radius: var(--border-radius);
      margin: 20px 0;
      font-size: 14px;
      color: var(--text-light);
    }

    .info-box code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
    }

    @media (max-width: 767px) {
      .player-section {
        padding: 20px;
      }

      #controls {
        gap: 8px;
      }

      #controls button {
        padding: 10px 14px;
        font-size: 13px;
      }

      .share-modal {
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>

<!-- Sticky Topbar -->
<div class="Topbar">
  <div class="topbar-inner">
    <h1 class="top-title">
      <a class="Topbarlink" href="https://camcookiem.github.io/">🎵 Camcookie Music</a>
    </h1>
    
    <!-- Desktop Navigation -->
    <div class="Topbar-links"></div>
    
    <!-- Mobile Menu Button -->
    <button class="Topbar-menu-btn" aria-label="Menu" title="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    
    <!-- Mobile Dropdown Menu -->
    <div class="Topbar-dropdown"></div>
  </div>
</div>

<!-- PAGE CONTENT -->
<div class="player-container">
  <div class="player-section">
    <h2>🎵 Archive Radio</h2>

    <div class="info-box">
      <p>💡 <strong>Usage:</strong> Add <code>?q=YOUR_SEARCH</code> to search for music.<br>
      Example: <code>?q=jazz</code></p>
    </div>

    <!-- Now Playing -->
    <div id="now-playing">Nothing playing yet</div>

    <!-- Audio Player -->
    <audio id="player" controls></audio>

    <!-- Controls -->
    <div id="controls">
      <button id="toggle"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play</button>
      <button id="skip"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 7v10l7-5-7-5zm9 0h3v10h-3z"/></svg>Skip</button>
      <button id="replay"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6a6 6 0 1 1-12 0H4a8 8 0 1 0 16 0c0-4.42-3.58-8-8-8z"/></svg>Replay</button>
      <button id="share"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7a3.2 3.2 0 0 0 0-1.39l7.05-4.11A3 3 0 1 0 17 5a3 3 0 0 0-2.91 2.09L7.05 11.2A3 3 0 1 0 6 19a3 3 0 0 0 2.91-2.09l7.14-4.17c.52.48 1.2.78 1.95.78a3 3 0 1 0 0-6"/></svg>Share</button>
    </div>

    <div class="info-box">
      <p>⚠️ <strong>Warning:</strong> Content is streamed from Archive.org and may be unpredictable.</p>
    </div>
  </div>

  <!-- Share Box -->
  <div id="share-box">
    <div class="share-modal">
      <h2>Share This Track</h2>
      <p>Copy this link to share:</p>
      <div id="share-link"></div>
      <button id="close-share">Close</button>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="footer">
  <p>&copy; 2025 Camcookie Music. Made with 🎵 by Camcookie.</p>
</footer>

<!-- Radio Logic -->
<script src="https://camcookiem.github.io/archive/radio.js"></script>

<!-- Topbar Script -->
<script src="https://camcookiem.github.io/script.js"></script>

</body>
</html>
